    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-surface text-on-surface font-body min-h-screen flex items-center justify-center overflow-hidden">
<!-- Intentional Suppressed Shells: This is a Splash Screen (Transactional/Focused Journey) -->
<!-- Atmospheric Background Layers -->
<div class="fixed inset-0 z-0">
<!-- Soft Premium Cream Base -->
<div class="absolute inset-0 bg-surface"></div>
<!-- Subtle Tonal Shift Gradient -->
<div class="absolute inset-0 bg-gradient-to-br from-surface via-surface-container-low to-surface-dim opacity-50"></div>
<!-- Subtle Islamic Geometric Pattern -->
<div class="absolute inset-0 pattern-overlay opacity-30"></div>
<!-- Decorative Organic Shapes (Asymmetry Principle) -->
<div class="absolute -top-[10%] -left-[5%] w-[60%] h-[60%] bg-primary-fixed/10 blur-[120px] rounded-full"></div>
<div class="absolute -bottom-[10%] -right-[5%] w-[50%] h-[50%] bg-tertiary-fixed/10 blur-[100px] rounded-full"></div>
</div>
<!-- Main Content Canvas -->
<main class="relative z-10 flex flex-col items-center justify-center text-center px-8">
<!-- Logo Container with Asymmetric Depth -->
<div class="relative mb-12">
<!-- Overlapping Editorial Shape -->
<div class="absolute inset-0 translate-x-4 translate-y-4 bg-surface-container-highest/20 rounded-full blur-2xl"></div>
<div class="relative">
<!-- Arabic Calligraphic Logo -->
<h1 class="font-arabic text-7xl md:text-9xl gold-shimmer tracking-normal leading-tight mb-2">
                    نور
                </h1>
<!-- English Brand Anchor (Typography Tension) -->
<h2 class="font-headline font-extrabold text-2xl md:text-3xl tracking-[0.4em] uppercase text-on-surface">
                    NOOR COLLECTIVE
                </h2>
</div>
</div>
<!-- Tagline (Typographic Contrast) -->
<div class="space-y-6 max-w-md">
<p class="font-label text-sm md:text-base tracking-[0.2em] text-primary font-medium uppercase">
                Discover Modest Fashion Globally
            </p>
<!-- Minimal Decorative Element -->
<div class="flex justify-center items-center gap-4">
<div class="h-[1px] w-12 bg-outline-variant/30"></div>
<span class="material-symbols-outlined text-primary-container text-xs" style="font-variation-settings: 'FILL' 1;">
                    diamond
                </span>
<div class="h-[1px] w-12 bg-outline-variant/30"></div>
</div>
</div>
<!-- Abstract High-End Imagery (Asymmetric Frame) -->
<div class="mt-20 relative w-64 h-80 md:w-80 md:h-[450px] rotate-2">
<!-- Ghost Shadow -->
<div class="absolute inset-0 bg-on-surface/5 translate-x-6 translate-y-6 rounded-xl blur-lg"></div>
<!-- Editorial Image Card -->
<div class="absolute inset-0 bg-surface-container-highest rounded-xl overflow-hidden">
<img class="w-full h-full object-cover opacity-90 mix-blend-multiply" data-alt="Close-up of elegant flowing silk fabric in cream and gold tones with soft shadows and high-end editorial lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDZB47Vphk4cq_nRi-7vBHzsdU9Sa2Op4ekFF285hORlUrZJKq-df77oKzGR5SSSYMv5F1zO0mZAE4rG_JxBcIEqr4u4MlniQQGL46rxkTyLdkNQQf10N9TKNlhmjm4Ilf2CYZ5yu51wyJGqozeDJWNtIproN568gLo9n3lzqqDLdko6Hg5D0v4X0odhmo1p6uBAj1nVCVmEKEzv0Aa2dF9Pz2WEkyD5gyaOabYYzqu8x0VF7cg-TZoMDVcOtiFvUdPGsZL7RnTHA"/>
</div>
<!-- Secondary Overlapping Card (The Maqam Philosophy) -->
<div class="absolute -bottom-8 -left-12 w-48 h-48 bg-surface-container-lowest/80 backdrop-blur-xl rounded-xl p-4 shadow-xl flex flex-col justify-end -rotate-6">
<p class="font-arabic text-lg text-primary text-left">الأناقة الأبدية</p>
<p class="font-headline text-[10px] tracking-widest uppercase text-on-surface/50 text-left">Timeless Grace</p>
</div>
</div>
</main>
<!-- Bottom Aesthetic Anchor (Fixed Branding) -->
<div class="fixed bottom-12 left-0 w-full flex flex-col items-center gap-4 pointer-events-none">
<div class="flex items-center gap-8 opacity-40">
<span class="font-label text-[10px] tracking-[0.3em] uppercase">Milan</span>
<span class="material-symbols-outlined text-[8px]">circle</span>
<span class="font-label text-[10px] tracking-[0.3em] uppercase">Dubai</span>
<span class="material-symbols-outlined text-[8px]">circle</span>
<span class="font-label text-[10px] tracking-[0.3em] uppercase">London</span>
</div>
<!-- Subtle Progress Indication (No-Line Principle) -->
<div class="w-16 h-[2px] bg-surface-container-highest relative overflow-hidden">
<div class="absolute inset-y-0 left-0 w-1/2 bg-primary animate-[shimmer_2s_infinite]"></div>
</div>
</div>
<!-- Screen Narrative: The user experiences a moment of pause and luxury before entering the atelier journey. -->
</body></html>
